<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COD Order Received</title>
  </head>
  <body style="margin: 0; padding: 0; background-color: #f5f7fb; font-family: Arial, sans-serif; color: #1f2937;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color: #f5f7fb; padding: 24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width: 600px; width: 100%; background: #ffffff; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden;">
            <tr>
              <td style="padding: 24px;">
                <h2 style="margin: 0 0 12px 0; font-size: 22px; color: #111827;">COD order received</h2>
                <p style="margin: 0 0 12px 0; line-height: 1.6;">Your order <strong>#${orderID}</strong> has been received.</p>
                <p style="margin: 0 0 12px 0; line-height: 1.6;">Amount payable on delivery: <strong>${amount}</strong></p>
                <p style="margin: 0; line-height: 1.6;">Our team will call you shortly to confirm this COD order before processing it.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
