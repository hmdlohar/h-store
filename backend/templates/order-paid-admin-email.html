<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Paid Order</title>
  </head>
  <body style="margin: 0; padding: 0; background-color: #f5f7fb; font-family: Arial, sans-serif; color: #1f2937;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color: #f5f7fb; padding: 24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width: 600px; width: 100%; background: #ffffff; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden;">
            <tr>
              <td style="padding: 24px;">
                <h2 style="margin: 0 0 12px 0; font-size: 22px; color: #111827;">New paid order</h2>
                <p style="margin: 0 0 8px 0;">Order: <strong>#${orderID}</strong></p>
                <p style="margin: 0 0 8px 0;">Amount: <strong>${amount}</strong></p>
                <p style="margin: 0 0 8px 0;">Customer: <strong>${customerName}</strong></p>
                <p style="margin: 0 0 8px 0;">Mobile: <strong>${customerMobile}</strong></p>
                <p style="margin: 0 0 8px 0;">Email: <strong>${customerEmail}</strong></p>
                <p style="margin: 0;">Open order: <a href="${orderUrl}" style="color: #2563eb;">${orderUrl}</a></p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
